name: .NET CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # --------------------------
  # 1. UNIT + REPOSITORY TESTS
  # --------------------------
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      # No services needed — Testcontainers starts its own MongoDB container
      - name: Run Unit + Repository Tests
        run: dotnet test --configuration Release --no-build --filter "Category=Validation|Category=Repository"


  # --------------------------
  # 2. INTEGRATION TESTS (REAL MONGO)
  # --------------------------
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      # Integration tests need the real DB
      - name: Run Integration Tests
        env:
          MongoDb__ConnectionString: mongodb://localhost:27017/testdb
        run: dotnet test --configuration Release --no-build --filter "Category=Integration"
