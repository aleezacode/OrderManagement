version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=${MONGO_DATABASE_NAME}
    networks:
      - order-management-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - order-management-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - order-management-network

  akhq:
    image: tchiotludo/akhq:latest
    container_name: akhq
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          server:
            access-log:
              enabled: true
          connections:
            local:
              properties:
                bootstrap.servers: "kafka:9092"
    networks:
      - order-management-network

  ordermanagement-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ordermanagement-api
    ports:
      - "5158:80"
    depends_on:
      mongodb:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      - MongoDBSettings__ConnectionString=mongodb://mongodb:27017
      - MongoDBSettings__DatabaseName=OrderManagementDB
      - MongoDBSettings__UserCollectionName=Users
      - MongoDBSettings__OrderCollectionName=Orders
      - MongoDBSettings__InventoryCollectionName=Inventory
      - MongoDBSettings__NotificationCollectionName=Notifications
      - MongoDBSettings__PaymentCollectionName=Payments
      - KafkaSettings__BootstrapServers=kafka:9092
    networks:
      - order-management-network

networks:
  order-management-network:
    driver: bridge

volumes:
  mongodb_data:
  kafka_data: 